<html>
<head><title> CALCOLATRICE </title></head>
<body>
<h1> CALCOLATRICE </h1>
<center><table>
    <tr><td colspan="4"><input id="output"></input>   </td></tr>
    <tr><td><button>%</button></td> <td><button id="b30">CE</button></td> <td><button id="b31">(</button></td> <td><button id="b32">)</button></td></tr>
    <tr><td><button>1/x</button></td> <td><button>x2</button></td> <td><button></button></td> <td><button id="b15">/</button></td></tr>
    <tr><td><button id="b7">7</button></td> <td><button id="b8">8</button></td> <td><button id="b9">9</button></td> <td><button id="b10">X</button></td></tr>
    <tr><td><button id="b4">4</button></td> <td><button id="b5">5</button></td> <td><button id="b6">6</button></td> <td><button id="b11">-</button></td></tr>
    <tr><td><button id="b1">1</button></td> <td><button id="b2">2</button></td> <td><button id="b3">3</button></td> <td><button id="b12">+</button></td></tr>
    <tr><td><button>+/-</button></td> <td><button id="b0">0</button></td> <td><button id="b14">,</button></td> <td><button id="b13">=</button></td></tr>    
</table></center>
</body>

<script>
    b0.onclick = function(){
        output.value+=("0");
    };
    b1.onclick = function(){
        output.value+=("1");
    };
    b2.onclick = function(){
        output.value+=("2");
    };
    b3.onclick = function(){
        output.value+=("3");
    };
    b4.onclick = function(){
        output.value+=("4");
    };
    b5.onclick = function(){
        output.value+=("5");
    };
    b6.onclick = function(){
        output.value+=("6");
    };
    b7.onclick = function(){
        output.value+=("7");
    };
    b8.onclick = function(){
        output.value+=("8");
    };
    b9.onclick = function(){
        output.value+=("9");
    };

    b12.onclick = function() { //Somma
        output.value+=("+");
    };
    
    b13.onclick = function(){ //Calcolo
        var val;
        val=output.value;
        output.value = eval(val);
    };

    b10.onclick = function(){ //prodotto
        output.value+=("*");
    };

    b15.onclick = function(){ //Divisione
        output.value+=("/");
    };

    b11.onclick = function(){ //Differenza
         output.value+="-";
    };

    b30.onclick = function(){ //Pulisci Schermo
        output.value = "";
    };

    b14.onclick = function(){ //Virgola
        output.value+=".";
    };

    b31.onclick = function(){ //Parentesi apera
        output.value+="(";
    };
    
    b32.onclick = function(){ //Parentesi chiusa
        output.value+=")";
    };




</script>

<style>
    body{
        background-color: cornsilk;
    }

    h1{
        margin-top: 20px;
        text-align: center;
        font-family: comic sans ms;
        color: firebrick;
    }

    table{
        margin-top: 50px;
        width: 400px;
        height: 600px;
        padding: 0px;
        border: solid 2px rgba(24, 1, 1, 0.801);    
    }

    td{
        padding: 0;
        margin: 0;
    }
    
    button{
        width: 100%;
        height: 100%;
        cursor: pointer;
        background-color: rgba(24, 1, 1, 0.801);
        color: white;
        transition: 0.5s;
        border: solid 1px rgba(24, 1, 1, 0.801);
    }

    button:hover{
        background-color: rgba(32, 27, 27, 0.623);
    }

    #output{
        text-align: left;

    }
    input{
        width: 100%;
        height: 100%;
        font-size: 40px;
    }
    
</style>
</html>
